<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wishlist site</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #18181b;
            /* Deep cozy charcoal */
            color: #e4e4e7;
            /* Soft light gray for reading */
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .main-content {
            flex: 2;
            background: #27272a;
            /* Slightly lighter gray for cards */
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            /* Deeper shadow for dark mode */
        }

        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .card {
            background: #27272a;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-top: 0;
            color: #fafafa;
            font-weight: 800;
            border-bottom: 2px solid #3f3f46;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .wishlist-item {
            display: flex;
            align-items: center;
            background-color: #303036;
            /* A soft lift from the card background */
            border: 1px solid #3f3f46;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            gap: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .wishlist-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .item-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #9db4a0;
            /* Keeps the comfy sage green */
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 1.15em;
            color: #9db4a0;
            /* Sage green links */
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .item-name:hover {
            color: #b5cbbb;
        }

        .item-price {
            font-size: 1.25em;
            font-weight: 800;
            color: #d4a373;
            /* Warm sand/tan for price */
            min-width: 80px;
            text-align: right;
        }

        .delete-btn {
            background-color: transparent;
            color: #e57373;
            /* Soft red */
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: background-color 0.2s, color 0.2s;
        }

        .delete-btn:hover {
            background-color: #4a2c2d;
            color: #ff9b9e;
        }

        .total-price {
            font-size: 1.8em;
            font-weight: 800;
            color: #9db4a0;
            margin: 15px 0;
            text-align: center;
            background: #18181b;
            /* Recessed look for the total */
            padding: 15px;
            border-radius: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #a1a1aa;
        }

        .form-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 16px;
            border: 2px solid #3f3f46;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1em;
            color: #fafafa;
            background-color: #18181b;
            /* Dark inputs */
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #9db4a0;
            background-color: #27272a;
        }

        .add-btn {
            background-color: #5d756c;
            /* Deeper sage for the button */
            color: white;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1em;
            font-family: inherit;
            transition: background-color 0.2s, transform 0.1s;
        }

        .add-btn:hover {
            background-color: #7b948a;
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .empty-state {
            text-align: center;
            color: #71717a;
            padding: 40px 0;
            font-size: 1.1em;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="main-content">
            <h2>My Wishlist</h2>
            <div id="wishlist-container">
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h2>Total Cost</h2>
                <div class="total-price">$<span id="total-cost">0.00</span></div>
                <p style="text-align: center; margin: 0; color: #a1a1aa; font-weight: 600;">
                    Items Selected: <span id="selected-count">0</span>
                </p>
            </div>

            <div class="card">
                <h2>Add New Item</h2>
                <div class="form-group">
                    <label for="newName">What do you want?</label>
                    <input type="text" id="newName" placeholder="e.g., A new mechanical keyboard">
                </div>
                <div class="form-group">
                    <label for="newPrice">How much is it?</label>
                    <input type="number" id="newPrice" placeholder="e.g., 45.00" step="0.01">
                </div>
                <div class="form-group">
                    <label for="newLink">Link to buy it</label>
                    <input type="url" id="newLink" placeholder="https://...">
                </div>
                <button class="add-btn" onclick="addItem()">Add to Wishlist</button>
            </div>
        </div>
    </div>

    <script>
        // Check if there is already saved data in localStorage, otherwise start with an empty array
        let wishlistItems = JSON.parse(localStorage.getItem('myCozyWishlist')) || [];

        // Function to save the current list to the browser's storage
        function saveList() {
            localStorage.setItem('myCozyWishlist', JSON.stringify(wishlistItems));
        }

        // Function to render the list to the screen
        function renderWishlist() {
            const container = document.getElementById('wishlist-container');
            container.innerHTML = ''; // Clear current list

            if (wishlistItems.length === 0) {
                container.innerHTML = '<div class="empty-state">Your wishlist is empty right now. Time to add some things!</div>';
            }

            wishlistItems.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'wishlist-item';

                // Create the HTML for each item
                itemDiv.innerHTML = `
                    <input type="checkbox" class="item-checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${index})">
                    <div class="item-details">
                        <a href="${item.link}" target="_blank" class="item-name">${item.name}</a>
                    </div>
                    <div class="item-price">$${parseFloat(item.price).toFixed(2)}</div>
                    <button class="delete-btn" onclick="deleteItem(${index})">Remove</button>
                `;

                container.appendChild(itemDiv);
            });

            updateTotal();
        }

        // Function to add a new item
        function addItem() {
            const nameInput = document.getElementById('newName').value;
            const priceInput = document.getElementById('newPrice').value;
            const linkInput = document.getElementById('newLink').value;

            // Basic validation
            if (!nameInput || !priceInput || !linkInput) {
                alert("Don't forget to fill out all the fields!");
                return;
            }

            // Add the new item
            wishlistItems.push({
                name: nameInput,
                price: parseFloat(priceInput),
                link: linkInput,
                checked: false
            });

            // Save to localStorage
            saveList();

            document.getElementById('newName').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('newLink').value = '';

            renderWishlist();
        }

        function deleteItem(index) {
            wishlistItems.splice(index, 1);
            saveList(); // Save changes
            renderWishlist();
        }

        function toggleCheck(index) {
            wishlistItems[index].checked = !wishlistItems[index].checked;
            saveList(); // Save the checked state
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            let count = 0;

            wishlistItems.forEach(item => {
                if (item.checked) {
                    total += parseFloat(item.price);
                    count++;
                }
            });

            document.getElementById('total-cost').innerText = total.toFixed(2);
            document.getElementById('selected-count').innerText = count;
        }

        renderWishlist();
    </script>
</body>

</html>
